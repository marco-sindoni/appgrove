# ─────────────────────────────────────────────────────────────────────────────
# deploy-test — merge su main = deploy AUTOMATICO in test (#07 2).
#
# Sequenza (#07 10/14/15): mvn test → build immagine → push ECR (tag per-SHA) →
# Flyway migrate (task ECS one-shot in VPC, PRIMA del deploy) → apply → health
# check → sync-pricing → frontend (bundle + config.json da Terraform).
#
# Build JVM di default; native GraalVM se il messaggio del commit di squash-merge
# contiene `[graal]` (case-insensitive) o via checkbox del dispatch (#07 7/9).
# Tag immagine: `<sha>` (JVM) oppure `<sha>-native` — la release prod promuove
# SOLO i tag `-native` (#07 23). Runner ARM64: le task ECS sono Graviton (UC 0004)
# e la build native sotto emulazione non è praticabile.
#
# Fino all'attivazione degli ambienti (variabile di repo AWS_ACCOUNT_ID assente)
# il workflow è un no-op: attivazione per fasi (#12), nessun costo.
# ─────────────────────────────────────────────────────────────────────────────
name: deploy-test

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      native:
        description: build native (GraalVM) — #07 9, per la parità test↔prod pre-release
        type: boolean
        default: false

# I deploy si accodano, non si cancellano a metà (#07 27 vale per le verifiche).
concurrency:
  group: deploy-test
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC (#07 1/25): nessuna chiave AWS

env:
  AWS_REGION: eu-west-1

jobs:
  # ── Parametri della run: tag immagine, build native?, aree toccate ─────────
  prepare:
    if: vars.AWS_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.params.outputs.native }}
      image_tag: ${{ steps.params.outputs.image_tag }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: main
          filters: |
            frontend:
              - 'frontend/**'
      - name: Determina native e tag immagine
        id: params
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_NATIVE: ${{ inputs.native }}
        run: |
          NATIVE=false
          # `[graal]` nel messaggio dello squash-merge (#07 7) o checkbox dispatch (#07 9).
          if [ "$DISPATCH_NATIVE" = "true" ] || grep -qi '\[graal\]' <<<"$HEAD_MSG"; then NATIVE=true; fi
          TAG="$GITHUB_SHA"
          [ "$NATIVE" = "true" ] && TAG="$GITHUB_SHA-native"
          echo "native=$NATIVE" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Build native: $NATIVE — tag immagine: $TAG"

  # ── Build servizi: mvn test → immagine ARM64 → push ECR test (#07 10) ──────
  # Si buildano SEMPRE tutte le immagini: ogni SHA ha un set completo e coerente
  # (necessario alla promozione per-SHA in prod); la native resta on-demand.
  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - service: core
            app_id: platform
          - service: fatture
            app_id: fatture
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: needs.prepare.outputs.native != 'true'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: graalvm/setup-graalvm@v1
        if: needs.prepare.outputs.native == 'true'
        with:
          distribution: graalvm-community
          java-version: '21'
          cache: maven
      - name: mvn test + package (JVM)
        if: needs.prepare.outputs.native != 'true'
        working-directory: services
        run: mvn -B -pl ${{ matrix.service }} -am package
      - name: mvn test + package (native GraalVM)
        if: needs.prepare.outputs.native == 'true'
        working-directory: services
        run: mvn -B -pl ${{ matrix.service }} -am package -Dnative
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/appgrove-github-actions-test
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build e push immagine (ECR test, tag per-SHA)
        env:
          ECR: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/appgrove-test-${{ matrix.app_id }}
          TAG: ${{ needs.prepare.outputs.image_tag }}
          FLAVOR: ${{ needs.prepare.outputs.native == 'true' && 'native' || 'jvm' }}
        run: |
          docker build -f "services/${{ matrix.service }}/src/main/docker/Dockerfile.$FLAVOR" \
            -t "$ECR:$TAG" "services/${{ matrix.service }}"
          docker push "$ECR:$TAG"

  # ── Lambda BFF auth: nativa ARM64 SEMPRE (UC 0015) ─────────────────────────
  # A differenza delle immagini ECS (JVM di default), il function.zip è sempre
  # nativo: su Lambda il cold start JVM non è praticabile, e la chiave per-SHA
  # deve esistere a ogni apply (chiave vuota = Lambda distrutta dal conditional).
  build-auth:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    outputs:
      lambda_key: ${{ steps.upload.outputs.lambda_key }}
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: '21'
          cache: maven
      - name: mvn test + package Lambda (native GraalVM, profilo `lambda`)
        working-directory: services
        run: mvn -B -pl auth -am package -Plambda -Dnative
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/appgrove-github-actions-test
          aws-region: ${{ env.AWS_REGION }}
      - name: Upload function.zip (bucket artefatti, chiave per-SHA)
        id: upload
        env:
          BUCKET: appgrove-lambda-artifacts-test-${{ vars.AWS_ACCOUNT_ID }}
          KEY: auth/${{ github.sha }}-native.zip
        run: |
          # Prima attivazione (bucket non ancora creato dall'apply): upload saltato,
          # chiave vuota → l'apply non crea la Lambda; dal push successivo tutto pieno.
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3 cp services/auth/target/function.zip "s3://$BUCKET/$KEY"
            echo "lambda_key=$KEY" >> "$GITHUB_OUTPUT"
            echo "Artefatto Lambda: s3://$BUCKET/$KEY"
          else
            echo "lambda_key=" >> "$GITHUB_OUTPUT"
            echo "::warning::Bucket artefatti Lambda assente ($BUCKET): primo giro di attivazione, Lambda auth non deployata (ri-eseguire il deploy dopo l'apply)."
          fi

  # ── Migrate → apply → health check → sync-pricing (#07 14/15) ──────────────
  deploy:
    needs: [prepare, build, build-auth]
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      AUTH_LAMBDA_KEY: ${{ needs.build-auth.outputs.lambda_key }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/appgrove-github-actions-test
          aws-region: ${{ env.AWS_REGION }}
      - name: Flyway migrate PRIMA del deploy (task one-shot in VPC, #07 15)
        run: |
          # Al primissimo deploy la task definition non esiste ancora: in quel caso
          # la migrazione (su schema vuoto) gira DOPO l'apply. Dai deploy successivi
          # l'ordine canonico è: migrate (immagine nuova) → apply (rollout).
          PRE=(); POST=()
          for app in platform fatture; do
            if aws ecs describe-task-definition --task-definition "appgrove-test-$app" >/dev/null 2>&1; then
              PRE+=("$app")
            else
              POST+=("$app")
            fi
          done
          printf '%s\n' "${POST[@]:-}" > /tmp/migrate-post
          for app in "${PRE[@]:-}"; do
            [ -n "$app" ] && ./infra/scripts/oneshot test "$app" "$IMAGE_TAG" migrate
          done
      - name: terraform apply (stessi wrapper del locale, #07 6)
        run: |
          TF_VAR_image_tag="$IMAGE_TAG" TF_VAR_auth_lambda_s3_key="$AUTH_LAMBDA_KEY" \
            ./infra/scripts/up test --yes
      - name: Flyway migrate post-apply (solo primo deploy di un servizio)
        run: |
          while read -r app; do
            [ -n "$app" ] && ./infra/scripts/oneshot test "$app" "$IMAGE_TAG" migrate
          done < /tmp/migrate-post
      - name: sync-pricing verso Paddle sandbox (#09 H37) — se i secret esistono
        run: |
          # Il secret per-env è creato con l'account Paddle (UC 0001/0025): finché
          # manca, la sync è saltata con warning (tracciato in UC 0005).
          if aws secretsmanager describe-secret --secret-id appgrove/test/paddle >/dev/null 2>&1; then
            ./infra/scripts/oneshot test platform "$IMAGE_TAG" sync-pricing
          else
            echo "::warning::sync-pricing saltata: secret 'appgrove/test/paddle' assente (account Paddle sandbox = UC 0001)."
          fi
      - name: Health check — attesa servizi stabili (#07 10)
        run: |
          CI_DEPLOY=$(./infra/scripts/output test ci_deploy --json)
          CLUSTER=$(jq -r '.ecs_cluster_name' <<<"$CI_DEPLOY")
          SERVICES=$(jq -r '.services[].ecs_service_name' <<<"$CI_DEPLOY" | xargs)
          # shellcheck disable=SC2086
          aws ecs wait services-stable --cluster "$CLUSTER" --services $SERVICES
          echo "Servizi stabili: $SERVICES"

  # ── Frontend: build + sync S3 + config.json da Terraform (#07 11/12) ───────
  # Bundle ricostruito solo se frontend/ è toccato (o dispatch manuale);
  # config.json è RISCRITTO a ogni deploy dagli output Terraform.
  frontend:
    needs: [prepare, deploy]
    runs-on: ubuntu-latest
    env:
      FULL_DEPLOY: ${{ needs.prepare.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/appgrove-github-actions-test
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        if: env.FULL_DEPLOY == 'true'
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build bundle (VITE_BUILD_SHA per l'error reporter, #08 23)
        if: env.FULL_DEPLOY == 'true'
        working-directory: frontend
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
        run: |
          npm ci
          npm run build
      - name: Source map → artifact privato CI (#08 24), MAI pubblicate
        if: env.FULL_DEPLOY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sourcemaps-${{ github.sha }}
          path: frontend/apps/*/dist/**/*.map
          retention-days: 90
      - name: Rimuovi le source map dal bundle
        if: env.FULL_DEPLOY == 'true'
        run: find frontend/apps/*/dist -name '*.map' -delete
      - name: Deploy SPA (sync S3 + config.json + invalidation CloudFront)
        run: |
          BUCKETS=$(./infra/scripts/output test spa_bucket_names --json)
          DISTS=$(./infra/scripts/output test spa_distribution_ids --json)
          CONFIG=$(./infra/scripts/output test spa_config --json)
          for app in backoffice admin; do
            BUCKET=$(jq -r --arg a "$app" '.[$a]' <<<"$BUCKETS")
            DIST=$(jq -r --arg a "$app" '.[$a]' <<<"$DISTS")
            if [ "$FULL_DEPLOY" = "true" ]; then
              # Asset con hash = cache lunga immutable; index.html/config.json = no-cache (#07 11).
              aws s3 sync "frontend/apps/$app/dist" "s3://$BUCKET" --delete \
                --exclude index.html --exclude config.json \
                --cache-control 'public,max-age=31536000,immutable'
              aws s3 cp "frontend/apps/$app/dist/index.html" "s3://$BUCKET/index.html" \
                --cache-control 'no-cache'
            fi
            # config.json SEMPRE dagli output Terraform (#07 12): mai hardcoded.
            jq --arg a "$app" '.[$a]' <<<"$CONFIG" > "/tmp/config-$app.json"
            aws s3 cp "/tmp/config-$app.json" "s3://$BUCKET/config.json" \
              --cache-control 'no-cache' --content-type application/json
            aws cloudfront create-invalidation --distribution-id "$DIST" \
              --paths '/index.html' '/config.json' >/dev/null
            echo "SPA $app: config.json aggiornato$( [ "$FULL_DEPLOY" = "true" ] && echo ' + bundle pubblicato' )."
          done
