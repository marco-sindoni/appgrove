<!-- Email auth appgrove (UC 0018) — nessun tracciamento di aperture o click. Vedi README.md.
     Nota: i commenti di questo file viaggiano dentro ogni email, quindi restano brevi. -->
<div style="margin:0;padding:24px 12px;background:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:520px;margin:0 auto;background:#ffffff;border-radius:12px;border:1px solid #e4e4e7;">
    <tr>
      <td style="padding:24px 28px 8px 28px;">
        <span style="font-size:17px;font-weight:700;letter-spacing:-0.2px;color:#18181b;">{{brand}}</span>
      </td>
    </tr>
    <tr>
      <td style="padding:8px 28px 0 28px;">
        <h1 style="margin:0 0 12px 0;font-size:20px;line-height:1.3;font-weight:600;color:#18181b;">{{heading}}</h1>
        <p style="margin:0 0 24px 0;font-size:15px;line-height:1.6;color:#3f3f46;">{{intro}}</p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 28px;">
        <a href="{{actionUrl}}" style="display:inline-block;padding:11px 22px;border-radius:8px;background:#ec5a72;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">{{actionLabel}}</a>
      </td>
    </tr>
    <tr>
      <td style="padding:24px 28px 0 28px;">
        <p style="margin:0 0 6px 0;font-size:13px;line-height:1.5;color:#71717a;">{{fallback}}</p>
        <p style="margin:0;font-size:13px;line-height:1.5;word-break:break-all;"><a href="{{actionUrl}}" style="color:#3f3f46;">{{actionUrl}}</a></p>
      </td>
    </tr>
    <tr>
      <td style="padding:24px 28px 28px 28px;">
        <p style="margin:0;padding-top:16px;border-top:1px solid #e4e4e7;font-size:13px;line-height:1.5;color:#71717a;">{{footer}}</p>
      </td>
    </tr>
  </table>
</div>
