# ── Config di TEST dell'app @@APP_NAME@@ (generata da tools/new-application) ──
# Postgres reale via Quarkus Dev Services (Testcontainers), immagine 17: la suite gira sul database
# vero, non su un sostituto in memoria. Gli invarianti che deve dimostrare (isolamento per tenant,
# erasure fisica, proiezione su tabella) non sarebbero credibili altrimenti.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=postgres:17

# Flyway reale: le migrazioni DI PRODUZIONE su schema @@SCHEMA@@ (V1 schema, V2 dominio,
# V3 audit purge, V4 proiezione entitlement).
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=@@SCHEMA@@
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.multitenant=DISCRIMINATOR

# JWT firmati localmente dall'harness di test (smallrye-jwt) — nessuna dipendenza da Cognito.
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://local.appgrove.app
smallrye.jwt.sign.key.location=privateKey.pem

# Entitlement: la RETE DI SICUREZZA è mockata (MockEntitlementService, tetto free @@FREE_CAP@@) →
# nessuna chiamata reale a core. La proiezione locale resta quella vera (tabella + consumer):
# la suite attraversa il percorso di produzione, non lo scavalca.
quarkus.rest-client.core-api.url=http://localhost:8080
appgrove.entitlement.projection.table=@@SCHEMA@@.entitlement_projection

# ── Framework GDPR (UC 0032) in test ──────────────────────────────────────────
# Code e storage sostituiti da mock in-memory (@Mock); worker/consumer guidati via drain().
quarkus.scheduler.enabled=false
appgrove.gdpr.audit-table=@@SCHEMA@@.gdpr_purge_audit

# ── Osservabilità (UC 0006) in test ───────────────────────────────────────────
# Tracing strumentato ma export spento anche in test (deterministico/offline: nessun tentativo
# OTLP verso localhost). Override espliciti del profilo principale (le application.properties di
# main/test si SOMMANO, quella di test vince): log console in testo leggibile e bridge EMF
# inerte (niente publisher su stdout nei test); la forma JSON è verificata nel modulo core.
quarkus.otel.traces.exporter=none
quarkus.otel.metrics.exporter=none
quarkus.otel.logs.exporter=none
quarkus.log.console.json=false
appgrove.metrics.emf.enabled=false
# Il probe MDC di test NON deve finire nello spec OpenAPI committato (store-schema gira anche
# nell'augmentation di test).
mp.openapi.scan.exclude.classes=app.appgrove.@@APP_ID@@.MdcProbeResource
