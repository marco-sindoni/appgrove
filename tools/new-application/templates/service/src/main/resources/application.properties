# ── app @@APP_NAME@@ / @@APP_ID@@ (@@USER_MODEL_NOTE@@) ───────────────────────
# Generato da tools/new-application (UC 0046). Le chiavi qui sotto sono anche la SORGENTE UNICA
# della mappa servizio→app_id→porta→schema letta da dev/lib/services.sh: cambiarle a mano cambia
# l'avvio locale, le rotte del proxy e le liste della CI. Non esiste un altro registro da allineare.
quarkus.application.name=@@APP_ID@@
quarkus.http.port=@@HTTP_PORT@@

# ── Persistenza ───────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# URL/credenziali a runtime (dev: Postgres locale; test: Dev Services; prod: RDS Proxy).

# Multitenancy DISCRIMINATOR: filtro tenant automatico via TenantResolver (JWT). Invarianti #1/#2.
quarkus.hibernate-orm.multitenant=DISCRIMINATOR
# Schema gestito da Flyway, non da Hibernate.
quarkus.hibernate-orm.database.generation=none

# ── Flyway (schema @@SCHEMA@@, di proprietà del servizio) ─────────────────────
quarkus.flyway.migrate-at-start=false
quarkus.flyway.schemas=@@SCHEMA@@

# ── JWT (stesso issuer/JWKS della piattaforma; in dev dall'auth locale UC 0010) ─
mp.jwt.verify.issuer=https://local.appgrove.app
%dev.mp.jwt.verify.publickey.location=http://localhost:9100/api/auth/jwks
# Autorizzazione ruoli sul claim `roles` (UC 0016, #02 10): come il core. Cloud: issuer/JWKS del pool
# e APPGROVE_AUTH_EXPECTED_CLIENT_ID iniettati dall'infra (task definition).
smallrye.jwt.path.groups=roles
appgrove.auth.expected-client-id=appgrove-local-bff

# ── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=appgrove @@APP_ID@@ API
quarkus.smallrye-openapi.info-version=v1
quarkus.smallrye-openapi.store-schema-directory=src/main/resources/META-INF/openapi

# ── Quota / entitlement (UC 0027 → proiezione locale UC 0046) ─────────────────
# Il tetto della metrica "@@METRIC@@" è risolto dall'entitlement (subscription → app_tier.limits).
#
# La lettura NON è una chiamata sincrona a core a ogni richiesta: l'app legge la propria proiezione
# locale (tabella qui sotto), alimentata dagli eventi di invalidazione sulla coda
# entitlement-@@APP_ID@@. La chiamata a core resta come RETE DI SICUREZZA per il solo caso "tenant
# sconosciuto o proiezione da rinfrescare" — per questo l'URL serve ancora.
quarkus.rest-client.core-api.url=http://localhost:8080
# Tabella di proiezione, nello schema del servizio. Config assente = proiezione disattivata (si
# ricade sul comportamento sincrono di UC 0027): è l'interruttore di sicurezza se il bus ha problemi.
appgrove.entitlement.projection.table=@@SCHEMA@@.entitlement_projection

# ── Framework GDPR export/erasure (UC 0032) ───────────────────────────────────
# Worker export + consumer purge (commons) consumano gdpr-export-@@APP_ID@@ / tenant-purge-@@APP_ID@@.
# Code SQS via ElasticMQ in locale (#11); in prod endpoint/bus reali (UC 0004).
%dev.appgrove.sqs.endpoint=http://localhost:9324
appgrove.sqs.region=eu-south-1
# Tabella di audit della purge (prova erasure #13 L70), nello schema del servizio.
appgrove.gdpr.audit-table=@@SCHEMA@@.gdpr_purge_audit
# Bucket export (≈S3): in dev MinIO dello stack locale; bucket cloud (SSE+lifecycle 7gg) → UC 0003.
appgrove.gdpr.export-bucket=gdpr-export
%dev.appgrove.s3.endpoint=http://localhost:9000
%dev.appgrove.s3.access-key=appgrove
%dev.appgrove.s3.secret-key=appgrove_local_dev

# ── Osservabilità di base (UC 0006/#08) ───────────────────────────────────────
# Logging strutturato (invariante #4): tenant_id/user_id/request_id/correlation_id dal commons;
# app_id=@@APP_ID@@ dal filtro del servizio. JSON in test/prod, testo leggibile in locale.
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
# Livelli (#08/6): root INFO; categoria applicativa pilotata da LOG_LEVEL (ECS valueFrom → SSM,
# cambio livello senza rebuild). In locale DEBUG.
quarkus.log.level=INFO
quarkus.log.category."app.appgrove".level=${LOG_LEVEL:INFO}
%dev.quarkus.log.category."app.appgrove".level=DEBUG
%dev.quarkus.hibernate-orm.log.sql=true
# Tracing strumentato, export SPENTO (#08/11): propagazione W3C, trace_id/span_id nei log, zero collector.
quarkus.otel.traces.exporter=none
quarkus.otel.metrics.exporter=none
quarkus.otel.logs.exporter=none
# Metriche business Micrometer→EMF (#08/8-9): bridge in commons, attivo solo dove stdout va su
# CloudWatch (test/prod); dimensioni whitelist app_id/env/endpoint/status/service.
appgrove.metrics.emf.enabled=true
%dev.appgrove.metrics.emf.enabled=false
appgrove.metrics.emf.step=60s
appgrove.app-id=@@APP_ID@@
# Health (#08/21): liveness /q/health/live senza DB (il check agroal è solo readiness);
# readiness /q/health/ready col DB — nessun timeout aggressivo (cold start Aurora ~10-15s).

# In dev applica le migrazioni all'avvio; in prod restano one-shot in CI (UC 0005).
%dev.quarkus.flyway.migrate-at-start=true
