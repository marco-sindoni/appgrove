      en: Table `platform.support_ticket` (Aurora PostgreSQL, eu-west-1)
    data_subjects:
      it: Utenti che aprono richieste di supporto o di esercizio dei diritti
      en: Users opening support or data-rights requests
    data_category:
      it: Contenuto libero (oggetto della richiesta di supporto/privacy)
      en: Free-form content (subject of the support/privacy request)
    purpose:
      it: "Gestione delle richieste di supporto e di esercizio dei diritti (ticketing in-house, #13 D21)"
      en: "Handling support and data-rights requests (in-house ticketing, #13 D21)"
    legal_basis:
      it: Contratto (art. 6.1.b GDPR); per i ticket privacy anche obbligo legale (art. 12 GDPR)
      en: Contract (art. 6(1)(b) GDPR); for privacy tickets also legal obligation (art. 12 GDPR)
    retention:
