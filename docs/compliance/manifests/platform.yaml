      en: "24 months from ticket closure, then automatic deletion (#13 E)"

  - key: support_ticket_message.body
    entity: app.appgrove.core.support.SupportTicketMessage
    field: body
    location:
      it: Tabella `platform.support_ticket_message` (Aurora PostgreSQL, eu-west-1)
      en: Table `platform.support_ticket_message` (Aurora PostgreSQL, eu-west-1)
    data_subjects:
      it: Utenti che scrivono nel thread di un ticket di supporto
      en: Users writing in a support-ticket thread
    data_category:
      it: Contenuto libero (testo dei messaggi del thread di supporto)
      en: Free-form content (support-thread message text)
    purpose:
      it: "Gestione delle richieste di supporto e di esercizio dei diritti (ticketing in-house, #13 D21)"
      en: "Handling support and data-rights requests (in-house ticketing, #13 D21)"
    legal_basis:
      it: Contratto (art. 6.1.b GDPR); per i ticket privacy anche obbligo legale (art. 12 GDPR)
      en: Contract (art. 6(1)(b) GDPR); for privacy tickets also legal obligation (art. 12 GDPR)
    retention:
      it: "24 mesi dalla chiusura del ticket, poi eliminazione automatica (#13 E)"
      en: "24 months from ticket closure, then automatic deletion (#13 E)"

  - key: logs.structured
    location:
      it: CloudWatch Logs (eu-west-1/eu-central-1); audit su S3/Glacier (#08 I)
      en: CloudWatch Logs (eu-west-1/eu-central-1); audit trail on S3/Glacier (#08 I)
    data_subjects:
      it: Utenti della piattaforma
      en: Platform users
    data_category:
      it: Identificativi tecnici nei log strutturati (`tenant_id`, `app_id`, `user_id`, IP)
      en: Technical identifiers in structured logs (`tenant_id`, `app_id`, `user_id`, IP)
    purpose:
      it: "Sicurezza, stabilità e diagnostica (limitazione di finalità — niente profilazione, #13 B12)"
      en: "Security, stability and diagnostics (purpose limitation — no profiling, #13 B12)"
    legal_basis:
      it: Legittimo interesse (art. 6.1.f GDPR — sicurezza e continuità del servizio)
      en: Legitimate interest (art. 6(1)(f) GDPR — service security and continuity)
    retention:
      it: Log applicativi prod 30 giorni; audit/sicurezza 12 mesi su S3→Glacier (#08 I26)
      en: Prod application logs 30 days; audit/security 12 months on S3→Glacier (#08 I26)

sections:
  - key: recipients
    title:
      it: Destinatari e sub-responsabili
      en: Recipients and sub-processors
    body:
      it: >-
        Sub-responsabili: **AWS** (hosting, regioni UE — DPA con SCC + certificazione DPF) e
        **Plausible Analytics** (analytics senza cookie, hosting UE). **Paddle** (Merchant of Record)
        è **titolare autonomo** per i dati di pagamento, non sub-responsabile (#13 H45-47).
        Lista pubblica: `content/subprocessors.md` (UC 0002).
      en: >-
        Sub-processors: **AWS** (hosting, EU regions — DPA with SCCs + DPF certification) and
        **Plausible Analytics** (cookieless analytics, EU hosting). **Paddle** (Merchant of Record)
        is an **independent controller** for payment data, not a sub-processor (#13 H45-47).
        Public list: `content/subprocessors.md` (UC 0002).
  - key: transfers
    title:
      it: Trasferimenti extra-UE
      en: Non-EU transfers
    body:
      it: >-
        Dati a riposo solo in regioni UE (eu-west-1; monitoring eu-central-1) — #13 I51.
        AWS Inc. (USA, CLOUD Act): garanzie DPF + SCC nel DPA, più cifratura at-rest/in-transit (#13 I52).
      en: >-
        Data at rest only in EU regions (eu-west-1; monitoring in eu-central-1) — #13 I51.
        AWS Inc. (US, CLOUD Act): DPF + SCC safeguards in the DPA, plus at-rest/in-transit encryption (#13 I52).
  - key: security
    title:
      it: Misure di sicurezza
      en: Security measures
    body:
      it: >-
        Cifratura at-rest e in-transit; isolamento per-tenant row-level (`tenant_id` solo dal JWT
        verificato); least-privilege IAM; token di invito persistiti solo come hash; soft-delete con
        purge programmata (grace 14 giorni); logging strutturato e audit trail (#02/#05/#06/#08).
      en: >-
        At-rest and in-transit encryption; row-level per-tenant isolation (`tenant_id` only from the
        verified JWT); least-privilege IAM; invitation tokens stored hashed only; soft-delete with
        scheduled purge (14-day grace); structured logging and audit trail (#02/#05/#06/#08).
