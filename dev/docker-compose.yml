# appgrove — stack di sviluppo locale (UC 0008)
#
# Dipendenze infrastrutturali in Compose; le APP (Quarkus dev mode + Vite) girano
# come PROCESSI sull'host (modello ibrido #11 §2), non qui: il proxy le raggiunge
# via host.docker.internal. Stack 100% offline, zero AWS.
#
# Avvio manuale (l'orchestrazione completa — setup/up/down/seed/migrate — è UC 0009):
#   docker compose -f dev/docker-compose.yml --env-file dev/.env up
#
# Prerequisiti (li renderà ripetibili `dev doctor`/`dev setup`, UC 0009):
#   - container engine attivo (es. colima start)
#   - certificati mkcert in dev/certs/ (vedi dev/README.md e il Caddyfile)

name: appgrove-dev

services:
  # Postgres ≈ Aurora. Connessione DIRETTA (niente RDS Proxy in locale, #11 §16).
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Caddy ≈ API Gateway v2: path-routing + TLS mkcert, un solo origin per le SPA.
  proxy:
    image: caddy:2
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    extra_hosts:
      # raggiunge i processi host (Quarkus dev / Vite) dal container del proxy
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config

  # Mailpit ≈ SES: cattura le email transazionali (UI su :8025). Healthcheck nativo dell'immagine.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  # MinIO ≈ S3: bucket export GDPR (#13 D) / asset. Console su :9001.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  # ElasticMQ ≈ SQS: code purge per-tenant (#06 H) + webhook Paddle (UC 0023) + export (#13 D).
  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "${ELASTICMQ_PORT:-9324}:9324"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro

  # ── auth-local — PLACEHOLDER (UC 0010) ──────────────────────────────────────
  # Il provider auth locale (firma JWT/JWKS, claim sub/tenant_id/roles dal DB,
  # refresh cookie, TOTP, email su Mailpit; stesso code path Quarkus OIDC di prod)
  # è materia di UC 0010. Lasciato qui come AGGANCIO: UC 0010 scommenta e riempie
  # immagine/build + env, poi attiva la route /api/auth/* nel Caddyfile.
  # auth-local:
  #   build: ../services/auth-local            # o immagine dedicata (UC 0010)
  #   environment:
  #     QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
  #     QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
  #     QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
  #   ports:
  #     - "9100:9100"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
