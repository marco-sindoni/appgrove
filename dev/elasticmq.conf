# appgrove — ElasticMQ (≈ SQS) per lo stack locale (UC 0008)
# Code iniziali predisposte; il consumo reale (purge/webhook/export) arriva con i
# rispettivi use case. Formato: HOCON (https://github.com/softwaremill/elasticmq).

include classpath("application.conf")

node-address {
    host = "localhost"
}

rest-sqs {
    enabled = true
    bind-hostname = "0.0.0.0"
}

queues {
    # ── Framework GDPR (UC 0032): una coda export e una coda purge PER SERVIZIO (#06 H-19) ──
    # Nomi = GdprQueues (services/commons); nel cloud le stesse code nascono dal modulo
    # microsaas_app + bus EventBridge (UC 0004 "Punti aperti"). Le vecchie code singole
    # gdpr-export/tenant-purge (mai consumate) sono sostituite dalle varianti per-servizio.

    # purge per-tenant (#06 H) — piattaforma (core) + fatture, con DLQ
    tenant-purge-platform {
        deadLettersQueue { name = "tenant-purge-platform-dlq", maxReceiveCount = 5 }
    }
    tenant-purge-platform-dlq { }
    tenant-purge-fatture {
        deadLettersQueue { name = "tenant-purge-fatture-dlq", maxReceiveCount = 5 }
    }
    tenant-purge-fatture-dlq { }

    # export job GDPR (#13 D22) — richieste per-servizio + coda risultati (consumata dal core)
    gdpr-export-platform {
        deadLettersQueue { name = "gdpr-export-platform-dlq", maxReceiveCount = 5 }
    }
    gdpr-export-platform-dlq { }
    gdpr-export-fatture {
        deadLettersQueue { name = "gdpr-export-fatture-dlq", maxReceiveCount = 5 }
    }
    gdpr-export-fatture-dlq { }
    gdpr-export-results {
        deadLettersQueue { name = "gdpr-export-results-dlq", maxReceiveCount = 5 }
    }
    gdpr-export-results-dlq { }

    # ── Invalidazione entitlement (UC 0046) — una coda PER APP di marketplace ──
    # Nomi = EntitlementEvents (services/commons). Core pubblica "i diritti del tenant T sono
    # cambiati"; l'app marca la propria proiezione da rinfrescare. Messaggio malformato o
    # invalidazione fallita → redrive → DLQ: perderla significherebbe servire dati vecchi
    # senza saperlo.
    entitlement-fatture {
        deadLettersQueue { name = "entitlement-fatture-dlq", maxReceiveCount = 5 }
    }
    entitlement-fatture-dlq { }

    # webhook Paddle (UC 0023) — con DLQ
    paddle-webhooks {
        deadLettersQueue { name = "paddle-webhooks-dlq", maxReceiveCount = 5 }
    }
    paddle-webhooks-dlq { }
}
