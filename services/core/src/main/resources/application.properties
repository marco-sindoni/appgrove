# ── core / platform service (UC 0012) ────────────────────────────────────────
quarkus.application.name=core

# ── Persistenza ───────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# URL/credenziali forniti a runtime (dev: Postgres locale; test: Dev Services; prod: RDS Proxy).

# Multitenancy DISCRIMINATOR: il filtro tenant è automatico via TenantResolver (JWT). Invarianti #1/#2.
quarkus.hibernate-orm.multitenant=DISCRIMINATOR
# Lo schema è gestito da Flyway, non da Hibernate.
quarkus.hibernate-orm.database.generation=none

# ── Flyway (schema platform) ──────────────────────────────────────────────────
# migrate-at-start OFF: le migrazioni girano in CI one-shot (UC 0005). In dev/test si abilita per profilo.
quarkus.flyway.migrate-at-start=false
quarkus.flyway.schemas=platform

# ── JWT ───────────────────────────────────────────────────────────────────────
# Verifica via MicroProfile JWT (smallrye-jwt). L'issuer/JWKS reale arriva con l'auth locale (UC 0010)
# e Cognito/Pre-Token-Gen (UC 0015/0016); qui l'issuer è un placeholder coerente con l'ambiente locale.
mp.jwt.verify.issuer=https://local.appgrove.app
# In dev i token sono emessi dal provider locale (services/auth, UC 0010): verifica via JWKS locale
# (stesso code path smallrye-jwt di test/prod, cambia solo la sorgente chiavi).
%dev.mp.jwt.verify.publickey.location=http://localhost:9100/api/auth/jwks
# Autorizzazione ruoli sul claim `roles` (UC 0016, #02 10): @RolesAllowed matcha su `roles`, non più
# sul default `groups` di smallrye. Il provider Local emette entrambi con lo stesso contenuto; in cloud
# il Pre-Token-Gen inietta `roles`.
smallrye.jwt.path.groups=roles
# Difesa in profondità (UC 0016): si accettano solo access token (token_use=access) con il client_id
# atteso. Locale = client del provider Local; in cloud l'infra inietta APPGROVE_AUTH_EXPECTED_CLIENT_ID
# (= app client Cognito) + MP_JWT_VERIFY_ISSUER / MP_JWT_VERIFY_PUBLICKEY_LOCATION del pool.
appgrove.auth.expected-client-id=appgrove-local-bff

# ── OpenAPI / Swagger (UC 0013) ───────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=appgrove core API
quarkus.smallrye-openapi.info-version=v1
# Spec generato e committato (META-INF/openapi/openapi.yaml): il drift è un git diff in CI;
# l'oasdiff bloccante sui breaking change vive nella pipeline (UC 0005, ☁).
quarkus.smallrye-openapi.store-schema-directory=src/main/resources/META-INF/openapi
# Swagger UI: libera in dev (default Quarkus). Il gating platform-admin in test/prod passa
# dall'authorizer (UC 0014, ☁); qui resta accessibile in locale.

# In dev (Dev Services Postgres effimero) applica le migrazioni all'avvio: schema reale, niente
# errori di validazione. In prod resta off (migrazioni one-shot in CI, UC 0005); in test è il %test.
%dev.quarkus.flyway.migrate-at-start=true

# ── Entitlement read-model (UC 0027) ──────────────────────────────────────────
# core ESPONE /me/entitlements; il client REST (EntitlementClient, in commons) è consumato dalle APP.
# core eredita comunque il bean dal commons: l'URL è qui solo per soddisfare la config del client (non
# usato da core). Le app puntano a core; il disaccoppiamento event-driven è tracciato (UC 0046).
quarkus.rest-client.core-api.url=http://localhost:8080

# ── Osservabilità di base (UC 0006/#08) ───────────────────────────────────────
# Logging strutturato (invariante #4): MDC tenant_id/user_id/request_id/correlation_id dal commons,
# app_id=platform dal filtro del servizio. JSON in test/prod (un evento CloudWatch per riga, MDC
# annidato sotto "mdc"), testo leggibile in locale.
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
# Livelli (#08/6): root INFO; la categoria applicativa è pilotata dalla variabile d'ambiente
# LOG_LEVEL (ECS valueFrom → SSM Parameter Store: cambio livello = update parametro + force new
# deployment, nessun rebuild). In locale DEBUG.
quarkus.log.level=INFO
quarkus.log.category."app.appgrove".level=${LOG_LEVEL:INFO}
%dev.quarkus.log.category."app.appgrove".level=DEBUG
%dev.quarkus.hibernate-orm.log.sql=true
# Tracing strumentato, export SPENTO (#08/11): propagazione W3C attiva, trace_id/span_id nei log,
# zero collector e zero costi. Accensione = evoluzione E10 (solo config).
quarkus.otel.traces.exporter=none
quarkus.otel.metrics.exporter=none
quarkus.otel.logs.exporter=none
# Metriche business Micrometer→EMF (#08/8-9): bridge in commons (EmfMeterRegistry), attivo solo
# dove stdout finisce su CloudWatch (test/prod); dimensioni whitelist app_id/env/endpoint/status/
# service. app_id del servizio core = platform; env lo inietta l'infra (variabile d'ambiente ECS).
appgrove.metrics.emf.enabled=true
%dev.appgrove.metrics.emf.enabled=false
appgrove.metrics.emf.step=60s
appgrove.app-id=platform
# Health (#08/21): liveness /q/health/live senza DB (il check agroal è solo readiness);
# readiness /q/health/ready col DB — nessun timeout aggressivo (cold start Aurora ~10-15s).

# ── Stub Paddle locale (UC 0023) ──────────────────────────────────────────────
# Selezione provider per profilo: stub di default (dev/test, deterministico, nessun account Paddle);
# il PaddlePaymentProvider reale è placeholder finché non attivabile (gated #14). Vedi #09 I39.
appgrove.payments.provider=stub
%prod.appgrove.payments.provider=paddle
# Secret di firma webhook (HMAC, formato reale ts=...;h1=...). Qui valore di TEST; il secret per-ambiente
# vive in Secrets Manager (#09 I38) — wiring per-env nel packaging cloud differito (UC 0025 "Punti aperti").
# Mai un secret reale in codice/repo.
appgrove.payments.webhook-secret=local-dev-paddle-webhook-secret
# Finestra anti-replay sulla firma (ts dell'header): oltre questa, la firma è rifiutata (401). ≤0 = disattiva.
appgrove.payments.webhook-max-age=PT5M
# Endpoint dev-only dello stub (trigger scenari, read subscription): attivi solo in dev/test.
%dev.appgrove.payments.dev-endpoints=true
# Esclusi dallo spec OpenAPI committato in OGNI profilo (sono dev-only): così `mvn test` (dev-endpoints
# attivi) e il build di package generano lo stesso contratto → niente drift del git diff.
mp.openapi.scan.exclude.classes=app.appgrove.core.billing.PaddleStubDevResource
appgrove.payments.webhook-queue-name=paddle-webhooks
# SQS via ElasticMQ in locale (#11). In prod l'endpoint è la vera SQS (UC 0025/infra).
%dev.appgrove.sqs.endpoint=http://localhost:9324
appgrove.sqs.region=eu-south-1
# Poller del consumer webhook: intervallo di drain della coda in dev (in test è disabilitato).
%dev.quarkus.scheduler.enabled=true

# ── Framework GDPR export/erasure (UC 0032) ───────────────────────────────────
# Tabella di audit della purge (prova erasure #13 L70), nello schema del servizio.
appgrove.gdpr.audit-table=platform.gdpr_purge_audit
# Bucket export (≈S3): in dev MinIO dello stack locale (credenziali di dev/.env); nel cloud il
# bucket con SSE + lifecycle auto-delete 7gg è di UC 0003 ("Punti aperti"). Il download utente
# passa SOLO dai presigned URL (7 giorni) generati dal core.
appgrove.gdpr.export-bucket=gdpr-export
%dev.appgrove.s3.endpoint=http://localhost:9000
%dev.appgrove.s3.access-key=appgrove
%dev.appgrove.s3.secret-key=appgrove_local_dev

# ── Ticketing & console diritti GDPR (UC 0034) ────────────────────────────────
# Casella della piattaforma che riceve i nuovi ticket/le risposte degli utenti (#13 D21).
appgrove.support.inbox=support@appgrove.app
# Email verso Mailpit in dev (come il servizio auth in locale); in test resta il MockMailbox di default.
# Il relay SES per il cloud è infrastruttura tracciata (UC 0034 "Punti aperti").
quarkus.mailer.from=noreply@appgrove.app
%dev.quarkus.mailer.mock=false
%dev.quarkus.mailer.host=localhost
%dev.quarkus.mailer.port=1025
%dev.quarkus.mailer.start-tls=DISABLED
# Deep-link console AWS (Logs Insights/S3) della console "Diritti GDPR": costruiti solo se la
# regione è configurata — in locale non lo è (niente CloudWatch) e la UI non mostra i link.
# Nel cloud: appgrove.aws-console.region=eu-south-1 e appgrove.aws-console.log-group=/ecs/appgrove.

# ── Pricing-as-code: sync allo startup (UC 0022) ──────────────────────────────
# In dev/test il catalogo è popolato dagli YAML allo startup (idempotente) → niente passi manuali
# (invariante CLAUDE.md "Avvio locale"). In prod resta OFF: la sync gira come step di deploy via
# l'entrypoint command-mode `sync-pricing` (cablaggio CI a UC 0005). Il flusso `dev seed` lo invoca
# esplicitamente prima delle subscription (con sync-on-startup disattivato per evitare doppio run).
appgrove.pricing.sync-on-startup=false
%dev.appgrove.pricing.sync-on-startup=true
# App fixture (catalogo sintetico per dev/test/E2E: notes/teams/legacy) caricate solo qui → MAI in prod
# (in prod la sync crea Product solo per le app reali). Vedi pricing/fixtures/.
appgrove.pricing.include-fixtures=false
%dev.appgrove.pricing.include-fixtures=true
