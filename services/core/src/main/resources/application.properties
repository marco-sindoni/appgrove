# ── core / platform service (UC 0012) ────────────────────────────────────────
quarkus.application.name=core

# ── Persistenza ───────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# URL/credenziali forniti a runtime (dev: Postgres locale; test: Dev Services; prod: RDS Proxy).

# Multitenancy DISCRIMINATOR: il filtro tenant è automatico via TenantResolver (JWT). Invarianti #1/#2.
quarkus.hibernate-orm.multitenant=DISCRIMINATOR
# Lo schema è gestito da Flyway, non da Hibernate.
quarkus.hibernate-orm.database.generation=none

# ── Flyway (schema platform) ──────────────────────────────────────────────────
# migrate-at-start OFF: le migrazioni girano in CI one-shot (UC 0005). In dev/test si abilita per profilo.
quarkus.flyway.migrate-at-start=false
quarkus.flyway.schemas=platform

# ── JWT ───────────────────────────────────────────────────────────────────────
# Verifica via MicroProfile JWT (smallrye-jwt). L'issuer/JWKS reale arriva con l'auth locale (UC 0010)
# e Cognito/Pre-Token-Gen (UC 0015/0016); qui l'issuer è un placeholder coerente con l'ambiente locale.
mp.jwt.verify.issuer=https://local.appgrove.app

# ── Logging strutturato (invariante #4): MDC tenant_id/user_id/request_id valorizzato dal commons. ──
quarkus.log.console.json=false
%dev.quarkus.hibernate-orm.log.sql=true
