# ── Config di TEST (UC 0013) ──────────────────────────────────────────────────
# Postgres reale via Quarkus Dev Services (Testcontainers), immagine 17.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=postgres:17

# Flyway reale: migrazioni di produzione su schema platform (V1 schema + V2 modello dominio).
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=platform
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.multitenant=DISCRIMINATOR

# JWT firmati localmente dall'harness di test (smallrye-jwt) — nessuna dipendenza da Cognito.
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://local.appgrove.app
smallrye.jwt.sign.key.location=privateKey.pem

# ── Stub Paddle (UC 0023) in test ─────────────────────────────────────────────
# Provider stub (default), endpoint dev attivi per testare il trigger scenari + read subscription.
appgrove.payments.dev-endpoints=true
# La coda SQS reale è sostituita da una InMemoryWebhookQueue (@io.quarkus.test.Mock): niente ElasticMQ/
# LocalStack nei test (deterministici, offline). Il consumer è guidato esplicitamente via drain().
quarkus.scheduler.enabled=false
