# ── Config di TEST (UC 0010) ──────────────────────────────────────────────────
# Postgres reale via Dev Services (Testcontainers); lo schema/seed li applica TestSchema.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=postgres:17

# Chiavi PEM bundle nel classpath di test (stesse del core).
auth.local.private-key-location=privateKey.pem
auth.local.public-key-location=publicKey.pem

# Schema auth_local applicato all'avvio (Flyway); platform/seed li applica TestSchema.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=auth_local

# 2FA: niente bypass nei test (esercitiamo la challenge). Email: mock (MockMailbox) di default in test.
auth.local.totp-bypass=false
auth.local.app-base-url=https://app.local.appgrove.app
