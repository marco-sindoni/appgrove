# ── app #1 / fatture (B2C single-user) — UC 0051 ──────────────────────────────
quarkus.application.name=fatture
quarkus.http.port=8081

# ── Persistenza ───────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# URL/credenziali a runtime (dev: Postgres locale; test: Dev Services; prod: RDS Proxy).

# Multitenancy DISCRIMINATOR: filtro tenant automatico via TenantResolver (JWT). Invarianti #1/#2.
quarkus.hibernate-orm.multitenant=DISCRIMINATOR
# Schema gestito da Flyway, non da Hibernate.
quarkus.hibernate-orm.database.generation=none

# ── Flyway (schema app_fatture, di proprietà del servizio) ────────────────────
quarkus.flyway.migrate-at-start=false
quarkus.flyway.schemas=app_fatture

# ── JWT (stesso issuer/JWKS della piattaforma; in dev dall'auth locale UC 0010) ─
mp.jwt.verify.issuer=https://local.appgrove.app
%dev.mp.jwt.verify.publickey.location=http://localhost:9100/api/auth/jwks

# ── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=appgrove fatture API
quarkus.smallrye-openapi.info-version=v1
quarkus.smallrye-openapi.store-schema-directory=src/main/resources/META-INF/openapi

# ── Quota / entitlement (UC 0027) ─────────────────────────────────────────────
# Il tetto della metrica "fatture" (flow, finestra mensile) NON è più config-driven: è risolto
# dall'entitlement (subscription → app_tier.limits) via EntitlementQuotaLimitSource (commons), che
# legge il read-model da core. URL del client entitlement (per-ambiente; in dev core è :8080).
# NOTA: chiamata sincrona app→core — antipattern a regime, disaccoppiamento tracciato (UC 0046).
quarkus.rest-client.core-api.url=http://localhost:8080

# ── Framework GDPR export/erasure (UC 0032) ───────────────────────────────────
# Worker export + consumer purge (commons) consumano gdpr-export-fatture / tenant-purge-fatture.
# Code SQS via ElasticMQ in locale (#11); in prod endpoint/bus reali (UC 0004).
%dev.appgrove.sqs.endpoint=http://localhost:9324
appgrove.sqs.region=eu-south-1
# Tabella di audit della purge (prova erasure #13 L70), nello schema del servizio.
appgrove.gdpr.audit-table=app_fatture.gdpr_purge_audit
# Bucket export (≈S3): in dev MinIO dello stack locale; bucket cloud (SSE+lifecycle 7gg) → UC 0003.
appgrove.gdpr.export-bucket=gdpr-export
%dev.appgrove.s3.endpoint=http://localhost:9000
%dev.appgrove.s3.access-key=appgrove
%dev.appgrove.s3.secret-key=appgrove_local_dev

# ── Logging strutturato (invariante #4): tenant_id/user_id/request_id dal commons; app_id qui. ──
quarkus.log.console.json=false
%dev.quarkus.hibernate-orm.log.sql=true

# In dev applica le migrazioni all'avvio; in prod restano one-shot in CI (UC 0005).
%dev.quarkus.flyway.migrate-at-start=true
