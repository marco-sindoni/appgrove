# ── auth — servizio auth (provider locale UC 0010/0058 + provider Cognito UC 0015) ───────────────────────────────
quarkus.application.name=auth
quarkus.http.port=9100

# ── Persistenza: legge lo schema platform (utenti). URL/credenziali a runtime ──
# (dev: Postgres locale dello stack; test: Dev Services). Nessuna migrazione qui:
# lo schema lo applica `dev migrate` (UC 0011), i dati `dev seed`.
quarkus.datasource.db-kind=postgresql

# ── Configurazione provider ───────────────────────────────────────────────────
# Selezione della porta IdentityProvider: local (dev/test) | cognito (cloud, UC 0015).
auth.provider=local
auth.local.issuer=https://local.appgrove.app
auth.local.kid=auth-local-dev
auth.local.access-ttl-seconds=900
auth.local.refresh-ttl-seconds=86400
# Password dev universale (solo ambiente locale, dati sintetici). Policy #02 dec.19.
auth.local.dev-password=Password1!
# Subject (cognito_sub) che ricevono il gruppo platform-admin (default = utente piattaforma del seed).
auth.local.platform-admin-subjects=seed-platform-admin
# Chiavi di firma: in dev passate da `dev up` (env → dev/auth/*.pem); fallback classpath.
auth.local.private-key-location=${AUTH_LOCAL_PRIVATE_KEY:privateKey.pem}
auth.local.public-key-location=${AUTH_LOCAL_PUBLIC_KEY:publicKey.pem}

# Verifica del Bearer access token sugli endpoint @Authenticated (2FA enroll/verify):
# stessa chiave pubblica con cui firmiamo, stesso issuer locale.
mp.jwt.verify.publickey.location=${auth.local.public-key-location}
mp.jwt.verify.issuer=${auth.local.issuer}

# ── Schema auth_local (Flyway): stato credenziali/2FA dev-only, isolato da platform ──
quarkus.flyway.schemas=auth_local
%dev.quarkus.flyway.migrate-at-start=true

# ── Email transazionali → Mailpit (solo dev; in prod l'auth è Cognito) ──
quarkus.mailer.from=noreply@appgrove.app
%dev.quarkus.mailer.mock=false
%dev.quarkus.mailer.host=localhost
%dev.quarkus.mailer.port=1025
%dev.quarkus.mailer.start-tls=DISABLED

# ── Flussi (UC 0058) ──
# Bypass 2FA: in dev attivo (E2E veloci, #02 dec.18); altrove off.
auth.local.totp-bypass=false
%dev.auth.local.totp-bypass=true
# Base URL nei link delle email (verifica/reset/invito).
auth.app-base-url=https://app.local.appgrove.app

# ── Template email EN/IT (UC 0018) ──
# Copiati da shared/email-templates dentro l'artefatto (maven-resources-plugin, pom.xml).
# Nella build nativa le risorse non referenziate staticamente vanno incluse a mano, o
# EmailTemplates non le troverebbe a runtime — e l'errore uscirebbe solo in cloud.
quarkus.native.resources.includes=email-templates/**

# ── Logging strutturato (invariante #4): MDC request_id via commons MdcRequestFilter ──
quarkus.log.console.json=false

# ── Profilo cloud (Lambda dietro API GW, UC 0015) — attivato con QUARKUS_PROFILE=cloud ──
# Provider Cognito; log JSON su stdout (#08); credenziali DB (RDS Proxy) da Secrets Manager.
# Il resto arriva dalle env della Lambda (Terraform): QUARKUS_DATASOURCE_JDBC_URL,
# AUTH_DB_SECRET_ARN, AUTH_COGNITO_USER_POOL_ID, AUTH_COGNITO_CLIENT_ID,
# AUTH_COGNITO_CLIENT_SECRET_PARAM (SSM SecureString), AUTH_APP_BASE_URL, AUTH_MAIL_FROM.
%cloud.auth.provider=cognito
%cloud.quarkus.log.console.json=true
%cloud.quarkus.datasource.credentials-provider=aws-secrets
